<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Faustus Ratio Splitter</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="app-header">
        <p class="eyebrow">Path of Exile exchange helper</p>
        <h1>Faustus Ratio Splitter</h1>
        <p class="lede">Set your stack and market ratio. Get the rows to post.</p>
      </header>

      <section class="calculator" aria-label="Ratio calculator">
        <form class="input-panel" id="calculatorForm">
          <label class="field">
            <span>I have</span>
            <input id="totalHave" name="totalHave" type="number" min="1" step="1" value="108" inputmode="numeric">
          </label>

          <div class="field ratio-field">
            <label for="ratioInput">
              <span>Market ratio</span>
            </label>
            <div class="ratio-line">
              <input id="ratioInput" name="ratioInput" type="text" value="1:1.19" autocomplete="off" spellcheck="false">
              <button id="flipRatio" type="button">Flip</button>
            </div>
          </div>

          <div class="range-row">
            <div class="range-label">
              <label for="ratioSlider">Ratio</label>
              <output id="ratioSliderOutput" for="ratioSlider">1.19</output>
            </div>
            <input id="ratioSlider" name="ratioSlider" type="range" min="0" max="1000" step="1" value="448">
          </div>

          <div class="range-row">
            <div class="range-label">
              <label for="nudgeBps">Nudge</label>
              <output id="nudgeOutput" for="nudgeBps">0.00%</output>
            </div>
            <input id="nudgeBps" name="nudgeBps" type="range" min="-250" max="250" step="5" value="0">
          </div>
        </form>

        <section class="answer-panel" aria-live="polite">
          <article class="primary-answer">
            <p class="eyebrow">Best clean listing</p>
            <h2 id="mainListing">Calculating...</h2>
            <p id="mainCopy" hidden></p>
          </article>

          <div class="quick-options">
            <article class="option">
              <span>Closest full-stack listing</span>
              <strong id="sellAllListing">-</strong>
              <small id="sellAllCopy"></small>
            </article>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="./app.mjs"></script>
  </body>
</html>
